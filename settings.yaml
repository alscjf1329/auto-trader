# ─────────────────────────────────────────
# 전략별 파라미터 (mode: strategy 일 때)
# ─────────────────────────────────────────
params:

  regime_adaptive:
    atr_window: 14
    regime_window: 60
    bb_window: 20
    bb_std: 2.0
    ma_short: 20
    ma_long: 60
    stop_loss: -5.0

  golden_cross:
    ma_short: 20
    ma_long: 60
    stop_loss: -5.0

  macd:
    fast: 12
    slow: 26
    signal: 9
    stop_loss: -5.0

  bollinger:
    window: 20
    num_std: 2.0
    stop_loss: -5.0

  momentum:
    take_profit: 5.0
    stop_loss: -3.0

  dual_momentum:
    stop_loss: -5.0

  rsi:
    rsi_buy: 30
    rsi_sell: 70
    stop_loss: -5.0

  turtle:
    entry_days: 20
    exit_days: 10
    atr_stop_multiplier: 2.0

  volatility_breakout:
    k: 0.5
