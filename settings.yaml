# =============================================================
#  auto-trader 설정 파일
#  API 키는 .env 파일에서 관리 (이 파일에는 넣지 마세요)
# =============================================================


# =============================================================
#  텔레그램 알림 설정
#  .env 에 TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID 추가 필요
# =============================================================
telegram:
  enabled: true          # 전체 알림 on/off 마스터 스위치

  on_buy:      true      # 매수 체결 알림
  on_sell:     true      # 매도 체결 알림
  on_error:    true      # 에러 발생 알림
  on_regime:   true      # 시장 국면 전환 알림 (bull↔bear)
  on_pool:     false     # 후보 풀 선정 알림 (장황하면 false)
  on_startup:  true      # 러너 시작 알림

  daily_summary:      true    # 일일 요약 알림 (장 마감 후)
  daily_summary_time: "16:00" # 요약 전송 시각 (KST)


# =============================================================
#  매매 기본 설정
# =============================================================

# ─────────────────────────────────────────
# 매매 기본 설정
# ─────────────────────────────────────────
trading:
  # 실행 모드
  #   strategy → 아래 strategy.name 전략 사용
  #   brain    → Claude AI가 유니버스에서 종목 발굴 + 자동 매수/매도
  mode: brain

  # 한국장 시간 (KST)
  market_open:  "09:05"   # 장 시작 (풀 선정 + 첫 매매)
  market_close: "15:20"   # 장 마감 전 마지막 체크

  # 미국장 시간 (KST)
  market_open_us:  "23:00"  # 나스닥 개장 30분 후
  market_close_us: "04:30"  # 미국장 마감 전

  # 매매 체크 주기 (분) — 장중 반복 실행 간격
  interval_minutes: 30      # 한국장 30분마다
  interval_minutes_us: 30   # 미국장 30분마다

  # 1회 최대 매수 금액
  max_buy_amount: 100000      # 원화 (한국주식)
  max_buy_amount_usd: 100     # 달러 (미국주식)

  # 손절 기준 (stop_loss 잡에서 사용, Claude 없이 즉시 매도)
  stop_loss_pct: -5.0         # 한국주식 손절 기준 (%)
  stop_loss_pct_us: -7.0      # 미국주식 손절 기준 (%) — 변동성 크므로 넉넉하게

  # 시장 국면 필터 — KODEX200/QQQ SMA200 하향 돌파 시 신규 매수 차단
  #   true  → bear 국면에서 매수 완전 차단 (MDD 방어 우선)
  #   false → 국면 무관하게 계속 매수 (수익 기회 우선)
  regime_filter: true


# ─────────────────────────────────────────
# Brain 모드 설정 (mode: brain 일 때)
# ─────────────────────────────────────────
brain:
  # 유니버스 → 후보 풀 압축 크기
  pool_size: 15       # 한국주식 후보 풀
  pool_size_us: 8     # 미국주식 후보 풀

  # 후보 풀 → 실제 매수 최대 종목 수
  buy_limit: 3        # 한국주식
  buy_limit_us: 3     # 미국주식

  # 후보 풀 갱신 주기
  #   daily  → 매일 장 시작 시 새로 선정
  #   weekly → 월요일에만 선정, 이후 재사용
  pool_refresh: daily

  # Claude 모델 — 단계별 비용 최적화
  #   Stage 1 (유니버스→후보 풀): 가장 복잡. Opus + thinking 유지.
  #   Stage 2 (후보 풀→매수 종목): 중간 복잡도. Sonnet으로 절감.
  #   Stage 3 (종목별 최종 확인): 단순 yes/no. Haiku로 최소화.
  model_stage1: "claude-opus-4-7"    # ~$5/1M input
  model_stage2: "claude-sonnet-4-6"  # ~$3/1M input
  model_stage3: "claude-haiku-4-5"   # ~$1/1M input


# ─────────────────────────────────────────
# 팩터 가중치 (합계 1.0이 되도록)
# ─────────────────────────────────────────
factor_weights:
  # ── 백테스트 검증 팩터 (IC 분석 기반, 3년 KOSPI 유니버스) ─────
  momentum_6m:  0.21   # 6개월 수익률 백분위  ← IC 0.088, ICIR 0.37 (최강)
  pos_52w:      0.18   # 52주 위치 (30~70% 이상적)  ← IC 0.086, ICIR 0.32
  volume_ratio: 0.15   # 거래량 비율 백분위   ← IC 0.044, ICIR 0.25
  momentum_3m:  0.09   # 3개월 수익률 백분위  ← IC 0.041, ICIR 0.16
  momentum_1m:  0.07   # 1개월 수익률 백분위  ← IC 0.027, ICIR 0.12
  # ── 실시간 수급 팩터 (백테스트 불가, 실전 보정용) ────────────
  foreign_flow: 0.15   # 외국인 순매수 백분위
  inst_flow:    0.10   # 기관 순매수 백분위
  sector:       0.05   # 섹터 강도

# ─────────────────────────────────────────
# 리스크 관리
# ─────────────────────────────────────────
risk:
  risk_per_trade_pct:      1.0   # 1회 매매 최대 손실: 포트폴리오의 1%
  atr_multiplier:          2.0   # ATR 손절 배수 (손실폭 계산용)
  max_position_pct:       20.0   # 종목 1개 최대 비중 (%)
  max_total_exposure_pct: 80.0   # 전체 주식 최대 노출도 (%)
  max_positions:           5     # 최대 동시 보유 종목 수
  take_profit_pct:         7.0   # 익절 기준 (%)  — 이 이상이면 Claude 없이 즉시 익절

  # 트레일링 스탑 — 최고가 대비 N% 이탈 시 자동 손절 (수익 보전)
  #   매수 후 주가가 오를수록 손절선도 함께 올라감
  #   예: 매수 100원 → 120원까지 올랐다가 → 114원(-5%) 되면 자동 매도
  trailing_stop_pct:     5.0   # 최고가 대비 이탈 허용 (%)
  trailing_stop_enabled: true  # false → 트레일링 스탑 비활성화

  # 상관관계 다양화 — 보유 종목과 상관계수 threshold 이상인 후보 매수 차단
  correlation_filter:    true  # false → 상관계수 필터 비활성화
  correlation_threshold: 0.70  # 이 이상이면 '동일 방향 종목'으로 판단해 제외


# ─────────────────────────────────────────
# 종목 블랙리스트 (매수 영구 제외)
# 런타임 변경: /blacklist add KR 005930
# ─────────────────────────────────────────
blacklist:
  kr: []    # 한국주식 제외 종목 코드
  us: []    # 미국주식 제외 티커


# ─────────────────────────────────────────
# 실전 안전장치
# ─────────────────────────────────────────
safety:
  # 당일 손실 한도 — 이 이상 손실 발생 시 신규 매수 즉시 중단
  # 0으로 설정하면 비활성화
  daily_loss_limit_krw: 500000   # 한국주식 당일 최대 손실 (원)
  daily_loss_limit_usd: 300      # 미국주식 당일 최대 손실 (USD)


